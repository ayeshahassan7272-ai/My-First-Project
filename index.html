<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classes List with Pagination</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Classes List with Pagination</h1>
        
        <!-- Items Container -->
        <div class="items-container" id="itemsContainer">
            <!-- Items JavaScript se load hongi -->
        </div>

        <!-- Pagination Controls -->
        <div class="pagination" id="pagination">
            <button id="prevBtn" class="page-btn" disabled>← Previous</button>
            <div id="pageNumbers" class="page-numbers"></div>
            <button id="nextBtn" class="page-btn">Next →</button>
        </div>

        <p id="pageInfo" class="page-info"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
